name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Install dependencies
        working-directory: source
        run: npm ci
      
      - name: Build
        working-directory: source
        run: npm run build
      
      - name: Checkout target repository
        run: |
          if [ -z "${{ secrets.PAT }}" ]; then
            echo "PAT secret is not set"
            exit 1
          fi
          git clone https://github.com/adriankentsato/adriankentsato.github.io.git target
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://${{ secrets.PAT }}@github.com/adriankentsato/adriankentsato.github.io.git
      
      - name: Clear target directory
        working-directory: target
        run: |
          find . -mindepth 1 -not -path './.git/*' -not -path './.git' -delete
      
      - name: Copy built files
        run: cp -r source/out/* target/
      
      - name: Commit and push
        working-directory: target
        run: |
          git add .
          git commit -m "Deploy from web-profile"
          git push
